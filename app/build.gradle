plugins {
    id 'application'
    id 'org.graalvm.buildtools.native' version '0.11.3'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    implementation project(':jawisp:core')
    implementation project(':jawisp:http-netty')
    
    implementation 'org.slf4j:slf4j-api:2.0.17'
    implementation 'org.slf4j:slf4j-simple:2.0.17'

    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    // implementation libs.guava
}

testing {
    suites {
        // Configure the built-in test suite
        test {
            // Use JUnit Jupiter test framework
            useJUnitJupiter('5.12.1')
        }
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

task generateReflectConfig(type: JavaExec) {
    group = 'build'
    description = 'Generate GraalVM reflect-config.json'
    classpath = sourceSets.main.compileClasspath
    mainClass = 'io.jawisp.core.inject.AnnotationAnalyzer'
}

tasks.named('compileJava') {
    dependsOn generateReflectConfig
}

application {
    mainClass = 'io.jawisp.example.App'
}
